<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Intramurals SY 2025-2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Georgia, serif;
      background: #f0ece4;
      min-height: 100vh;
    }

    nav {
      background: #1a1a2e;
      padding: 14px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav span {
      color: #e0d5c5;
      font-size: 14px;
      letter-spacing: 1px;
    }

    nav a {
      color: #e0d5c5;
      text-decoration: none;
      margin-left: 16px;
      font-size: 13px;
      padding: 6px 14px;
      border: 1px solid #e0d5c5;
      border-radius: 3px;
    }

    nav a:hover, nav a.active {
      background: #e0d5c5;
      color: #1a1a2e;
    }

    .page {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 50px);
      padding: 40px 20px;
    }

    .card {
      background: white;
      border: 1px solid #ccc;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 4px 4px 0px #1a1a2e;
    }

    h2 {
      font-size: 22px;
      color: #1a1a2e;
      margin-bottom: 24px;
      letter-spacing: 1px;
      border-bottom: 2px solid #1a1a2e;
      padding-bottom: 10px;
    }

    label {
      display: block;
      font-size: 12px;
      letter-spacing: 1px;
      color: #555;
      margin-bottom: 5px;
      margin-top: 16px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
      font-family: Georgia, serif;
      outline: none;
    }

    input:focus {
      border-color: #1a1a2e;
    }

    button {
      width: 100%;
      margin-top: 24px;
      padding: 12px;
      background: #1a1a2e;
      color: white;
      border: none;
      font-size: 14px;
      letter-spacing: 2px;
      cursor: pointer;
      font-family: Georgia, serif;
    }

    button:hover {
      background: #2e2e50;
    }

    #message {
      margin-top: 16px;
      font-size: 13px;
      text-align: center;
      min-height: 20px;
      color: #1a1a2e;
    }
  </style>
</head>
<body>

  <nav>
    <span>Intramurals SY 2025-2026</span>
    <div>
      <a href="index.html" class="active">Sign Up</a>
      <a href="teamchecker.html">Team Checker</a>
      <a href="players.html">Players</a>
    </div>
  </nav>

  <div class="page">
    <div class="card">
      <h2>Create Account</h2>

      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username">

      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password">

      <button onclick="signUp()">SIGN UP</button>

      <p id="message"></p>
    </div>
  </div>

  <script>
    function signUp() {
      var username = document.getElementById("username").innerHTML;
      username = document.getElementById("username").value;
      var password = document.getElementById("password").value;
      var message = document.getElementById("message");

      if (username == "" || password == "") {
        message.innerHTML = "Please fill in all fields.";
      } else if (password.length < 6) {
        message.innerHTML = "Password must be at least 6 characters.";
      } else {
        message.innerHTML = "Account created. You may now log in using your credentials.";
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";
      }
    }
  </script>

</body>
</html>
